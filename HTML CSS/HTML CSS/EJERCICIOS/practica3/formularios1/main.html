<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link type ="text/css" rel="stylesheet" href="css/form1.css">
</head>
<body>
    <form>
        <fieldset>
            <legend>Datos personales</legend>
            <label for="Nombre">Nombre</label><br>
            <input type="text" name="Nombre" id="Nombre" placeholder="Escribe tu nombre"><br>
            <label for="Apellido">Apellido</label><br>
            <input type="text" name="Apellido" id="Apellido"  placeholder="Escribe tus apellidos"><br>
            <label for="DNI">DNI</label><br>
            <input type="text" name="DNI" id="DNI"  placeholder="EJ: 0123456789"><br>
            <label for="Fecha de nacimiento">Fecha de nacimiento</label><br>
            <input type="text" name="Fecha" id="Fecha"  placeholder="Ej:01/01/1990"><br>  
        </fieldset>
        <fieldset>
            <legend > Datos del usuario</legend>
            <label for="Nombre Usuario">Nombre Usuario</label><br>
            <input type="email" name="Usuario" id="Usuario"  placeholder="correo@dominio.com"><br>
            <label for="contraseña">Contraseña</label><br>
            <input type="password" name="contraseña" id="contraseña"  ><br>
            <label for="repite">Repite la contraseña</label><br>
            <input type="password" name="repite" id="repite" ><br>  
        </fieldset>
        <fieldset>
            <legend> Datos de la Web</legend>
            <label for="Nombre de la web">Nombre de la Web</label><br>
            <input type="text" name="web" id="web"  placeholder="nombre de la web">
            <br>
          <button type="reset">Enviar datos</button>
        </fieldset>
    </form>
</body>
</html>
